version: '3.9'

services:
  postfix:
    image: catatnight/postfix:latest
    container_name: postfix
    environment:
      - maildomain=localhost           # Use localhost or container name since no real domain
      - smtp_user=user:password        # username:password for SMTP auth
    ports:
      - "25:25"       # SMTP port (for testing)
      - "587:587"     # Submission port (authenticated)
      - "465:465"     # Optional SMTPS port
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mailnet

networks:
  mailnet:
    driver: bridge